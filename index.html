<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chess Game (Correct Check/Checkmate)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(8, 50px);
      border: 3px solid #333;
      border-radius: 4px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }
    .square {
      width: 50px;
      height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      cursor: pointer;
      user-select: none;
      box-sizing: border-box;
    }
    .white { background: #f0d9b5; }
    .black { background: #b58863; }
    .highlight { background: #acd157 !important; }
    .valid {
      position: relative;
    }
    .valid::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(0,0,0,0.2);
    }
    .status {
      padding: 10px 16px;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-size: 15px;
      text-align: center;
    }
    .turn {
      font-weight: 600;
      color: #007acc;
    }
    .game-over {
      color: #d00;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status">
      <span class="turn" id="statusText">White to move</span>
    </div>
    <div class="board" id="board"></div>
  </div>

  <script>
    const board = document.getElementById("board");
    const statusText = document.getElementById("statusText");

    const PIECES = {
      wPawn: "♙",   bPawn: "♟",
      wRook: "♖",   bRook: "♜",
      wKnight: "♘", bKnight: "♞",
      wBishop: "♗", bBishop: "♝",
      wQueen: "♕",  bQueen: "♛",
      wKing: "♔",   bKing: "♚",
    };

    let layout = [
      ["bRook", "bKnight", "bBishop", "bQueen", "bKing", "bBishop", "bKnight", "bRook"],
      ["bPawn", "bPawn", "bPawn", "bPawn", "bPawn", "bPawn", "bPawn", "bPawn"],
      ["", "", "", "", "", "", "", ""],
      ["", "", "", "", "", "", "", ""],
      ["", "", "", "", "", "", "", ""],
      ["", "", "", "", "", "", "", ""],
      ["wPawn", "wPawn", "wPawn", "wPawn", "wPawn", "wPawn", "wPawn", "wPawn"],
      ["wRook", "wKnight", "wBishop", "wQueen", "wKing", "wBishop", "wKnight", "wRook"]
    ];

    let currentPlayer = "white"; // white/black
    let selectedSquare = null;
    let validMoves = [];
    let isGameOver = false;

    // Index helpers
    function toIndex(row, col) { return row * 8 + col; }
    function fromIndex(idx) { return { row: Math.floor(idx / 8), col: idx % 8 }; }

    // Get all attack moves (ignoring own‑color) for a square
    function getAttacks(row, col, piece) {
      const moves = [];
      const isWhite = piece.startsWith("w");
      const color = isWhite ? "white" : "black";

      const addIfValid = (r, c, capturesOnly = false) => {
        if (r < 0 || r > 7 || c < 0 || c > 7) return false;
        const target = layout[r][c];
        if (!target) {
          if (!capturesOnly) {
            moves.push({ fromRow: row, fromCol: col, toRow: r, toCol: c });
          }
          return true;
        }
        const isTargetWhite = target.startsWith("w");
        const targetColor = isTargetWhite ? "white" : "black";
        if (targetColor !== color) {
          moves.push({ fromRow: row, fromCol: col, toRow: r, toCol: c });
        }
        return false;
      };

      const addRay = (dr, dc) => {
        let r = row + dr;
        let c = col + dc;
        while (r >= 0 && r <= 7 && c >= 0 && c <= 7) {
          const target = layout[r][c];
          if (!target) {
            moves.push({ fromRow: row, fromCol: col, toRow: r, toCol: c });
          } else {
            const isTargetWhite = target.startsWith("w");
            const targetColor = isTargetWhite ? "white" : "black";
            if (targetColor !== color) {
              moves.push({ fromRow: row, fromCol: col, toRow: r, toCol: c });
            }
            break;
          }
          r += dr;
          c += dc;
        }
      };

      switch (piece) {
        case "wPawn":
        case "bPawn": {
          const direction = piece === "wPawn" ? -1 : 1;
          const r2 = row + direction * 2;
          if (row + direction >= 0 && row + direction <= 7) {
            if (!layout[row + direction][col]) {
              addIfValid(row + direction, col);
            }
            if ((piece === "wPawn" && row === 6) || (piece === "bPawn" && row === 1)) {
              if (!layout[row + direction][col] && !layout[row + direction * 2][col]) {
                addIfValid(row + direction * 2, col);
              }
            }
            if (col > 0) {
              const tar = layout[row + direction][col - 1];
              if (tar && ((piece === "wPawn" && tar.startsWith("b")) || (piece === "bPawn" && tar.startsWith("w")))) {
                addIfValid(row + direction, col - 1);
              }
            }
            if (col < 7) {
              const tar = layout[row + direction][col + 1];
              if (tar && ((piece === "wPawn" && tar.startsWith("b")) || (piece === "bPawn" && tar.startsWith("w")))) {
                addIfValid(row + direction, col + 1);
              }
            }
          }
          break;
        }

        case "wKnight":
        case "bKnight":
          for (const [dr, dc] of [[-2, -1], [-2, 1], [-1, -2], [-1, 2], [1, -2], [1, 2], [2, -1], [2, 1]]) {
            addIfValid(row + dr, col + dc);
          }
          break;

        case "wBishop":
        case "bBishop":
          addRay(-1, -1);
          addRay(-1, 1);
          addRay(1, -1);
          addRay(1, 1);
          break;

        case "wRook":
        case "bRook":
          addRay(-1, 0);
          addRay(1, 0);
          addRay(0, -1);
          addRay(0, 1);
          break;

        case "wQueen":
        case "bQueen":
          addRay(-1, -1);
          addRay(-1, 1);
          addRay(1, -1);
          addRay(1, 1);
          addRay(-1, 0);
          addRay(1, 0);
          addRay(0, -1);
          addRay(0, 1);
          break;

        case "wKing":
        case "bKing":
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              addIfValid(row + dr, col + dc);
            }
          }
          break;
      }

      return moves;
    }

    // Is the king of `kingColor` currently in check?
    function inCheck(kingColor) {
      const kingPiece = kingColor === "white" ? "wKing" : "bKing";
      let kingRow = -1, kingCol = -1;
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          if (layout[r][c] === kingPiece) { kingRow = r; kingCol = c; }
        }
      }
      if (kingRow === -1) return false;

      const attackerColor = kingColor === "white" ? "black" : "white";
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const piece = layout[r][c];
          if (!piece) continue;
          const isWhite = piece.startsWith("w");
          const pColor = isWhite ? "white" : "black";
          if (pColor !== attackerColor) continue;

          const attacks = getAttacks(r, c, piece);
          if (attacks.some(a => a.toRow === kingRow && a.toCol === kingCol)) {
            return true;
          }
        }
      }
      return false;
    }

    // Compute **all legal moves** for a given piece, obeying check rules
    function getLegalMoves(row, col, piece) {
      const pseudoMoves = getAttacks(row, col, piece);
      const moves = [];
      const isWhite = piece.startsWith("w");
      const color = isWhite ? "white" : "black";

      for (const move of pseudoMoves) {
        const { toRow, toCol } = move;

        // Simulate move
        const tempLayout = layout.map(r => [...r]);
        const captured = tempLayout[toRow][toCol];
        tempLayout[toRow][toCol] = tempLayout[row][col];
        tempLayout[row][col] = "";

        // Check if king is still in check after this move
        const newKingColor = color;
        const isStillInCheck = (() => {
          let kingRow = -1, kingCol = -1;
          const kingPiece = color === "white" ? "wKing" : "bKing";
          for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
              if (tempLayout[r][c] === kingPiece) { kingRow = r; kingCol = c; }
            }
          }

          for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
              const p = tempLayout[r][c];
              if (!p) continue;
              const isPWhite = p.startsWith("w");
              const pColor = isPWhite ? "white" : "black";
              if (pColor === color) continue;

              const attacks = getAttacks(r, c, p);
              if (attacks.some(a => a.toRow === kingRow && a.toCol === kingCol)) {
                return true;
              }
            }
          }
          return false;
        })();

        if (!isStillInCheck) {
          moves.push(move);
        }
      }

      return moves;
    }

    // Get all legal moves **for current player** + king position
    function getValidMovesForColor(color) {
      const moves = [];
      const kingPiece = color === "white" ? "wKing" : "bKing";
      let kingRow = -1, kingCol = -1;

      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const piece = layout[r][c];
          if (!piece) continue;
          const isWhite = piece.startsWith("w");
          const pColor = isWhite ? "white" : "black";
          if (pColor !== color) continue;

          const legalMoves = getLegalMoves(r, c, piece);
          moves.push(...legalMoves);

          if (piece === kingPiece) { kingRow = r; kingCol = c; }
        }
      }

      return { moves, kingRow, kingCol };
    }

    // Check if current player is in checkmate
    function isCheckmate() {
      const { moves } = getValidMovesForColor(currentPlayer);
      return inCheck(currentPlayer) && moves.length === 0;
    }

    // Render UI
    function renderBoard() {
      if (isGameOver) return;

      board.innerHTML = "";
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          const idx = toIndex(row, col);
          const piece = layout[row][col];
          const square = document.createElement("div");
          square.className = "square " + ((row + col) % 2 === 0 ? "white" : "black");
          square.dataset.row = row;
          square.dataset.col = col;

          const pieceEl = document.createElement("span");
          pieceEl.className = "piece";
          if (piece) {
            const isWhite = piece.startsWith("w");
            pieceEl.textContent = PIECES[piece];
            pieceEl.dataset.piece = piece;
          }
          square.append(pieceEl);

          square.addEventListener("click", () => handleSquareClick(square, row, col, idx));
          board.append(square);
        }
      }

      statusText.classList.remove("game-over");
      if (isCheckmate()) {
        isGameOver = true;
        const winner = currentPlayer === "white" ? "Black" : "White";
        statusText.classList.add("game-over");
        statusText.textContent = `${winner} wins by checkmate!`;
      } else if (inCheck(currentPlayer)) {
        statusText.textContent = `${currentPlayer === "white" ? "Black" : "White"} is in check!`;
      } else {
        statusText.textContent = `${currentPlayer === "white" ? "White" : "Black"} to move`;
      }

      refreshHighlights();
    }

    function refreshHighlights() {
      const squares = board.querySelectorAll(".square");
      squares.forEach(sq => sq.classList.remove("highlight", "valid"));

      if (selectedSquare) {
        const idx = parseInt(selectedSquare.dataset.row) * 8 + parseInt(selectedSquare.dataset.col);
        const { row: sr, col: sc } = fromIndex(idx);
        const piece = layout[sr][sc];
        if (!piece) {
          selectedSquare = null;
          return;
        }
        const isWhite = piece.startsWith("w");
        const color = isWhite ? "white" : "black";
        if (color !== currentPlayer) {
          selectedSquare = null;
          return;
        }
        selectedSquare.classList.add("highlight");
      }

      for (const move of validMoves) {
        const el = board.querySelector(`[data-row="${move.toRow}"][data-col="${move.toCol}"]`);
        if (el) el.classList.add("valid");
      }
    }

    function handleSquareClick(square, row, col, idx) {
      if (isGameOver) return;

      if (!selectedSquare) {
        const piece = layout[row][col];
        if (!piece) return;

        const isWhite = piece.startsWith("w");
        const color = isWhite ? "white" : "black";
        if (color !== currentPlayer) return;

        selectedSquare = square;
        validMoves = getLegalMoves(row, col, piece);
        refreshHighlights();
        return;
      }

      const selRow = parseInt(selectedSquare.dataset.row);
      const selCol = parseInt(selectedSquare.dataset.col);
      const selPiece = layout[selRow][selCol];

      if (selRow === row && selCol === col) {
        selectedSquare = null;
        validMoves = [];
        refreshHighlights();
        return;
      }

      const moveIdx = validMoves.findIndex(m => m.toRow === row && m.toCol === col);
      if (moveIdx < 0) {
        const piece = layout[row][col];
        if (piece && piece.startsWith(currentPlayer === "white" ? "w" : "b")) {
          selectedSquare = square;
          validMoves = getLegalMoves(row, col, piece);
          refreshHighlights();
        } else {
          selectedSquare = null;
          validMoves = [];
          refreshHighlights();
        }
        return;
      }

      // Perform move
      layout[row][col] = selPiece;
      layout[selRow][selCol] = "";

      selectedSquare = null;
      validMoves = [];

      const nextPlayer = currentPlayer === "white" ? "black" : "white";
      if (isCheckmate()) {
